  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<title>Project Lifecycle Progress<\u002Ftitle>\n\n<script src=\"2f86bd8b-3f87-4e55-a594-4a536f6f09a9\"><\u002Fscript>\n<style>\n  body { margin:0; font-family: Helvetica, Arial, sans-serif; background:#fafafb; overflow-x:auto; }\n  #toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; width:1900px; padding:20px 40px 0; box-sizing:border-box; }\n  #hint { font-size:13px; color:#737a86; }\n  #downloadBtn { font-size:13px; font-weight:600; padding:8px 16px; border-radius:6px; border:1px solid #b3b8c2; background:#fff; color:#333; cursor:pointer; white-space:nowrap; }\n  #downloadBtn:hover { background:#f0f1f3; }\n  #downloadBtn + #downloadSvgBtn { margin-left:8px; }\n  #capture { padding:32px 40px; width:1900px; box-sizing:border-box; background:#fff; }\n  #legend { display:flex; align-items:center; gap:28px; margin-bottom:22px; }\n  .legend-item { display:flex; align-items:center; gap:8px; font-size:14px; color:#737a86; }\n  .legend-dot { width:12px; height:12px; border-radius:50%; }\n  #phaseBar { display:flex; width:100%; overflow:hidden; }\n  .phase { color:#fff; text-align:center; font-weight:700; font-size:13px; letter-spacing:0.4px; padding:9px 10px; display:flex; align-items:center; justify-content:center; min-height:34px; flex-basis:0; }\n  #stages { display:flex; width:100%; padding-top:26px; position:relative; }\n  .stage-col { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; }\n  .circle-wrap { height:68px; width:100%; display:flex; align-items:center; justify-content:center; position:relative; }\n  .connector { position:absolute; height:2px; right:50%; width:100%; top:34px; margin-top:-1px; z-index:0; }\n  .circle { position:relative; z-index:1; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; box-sizing:border-box; cursor:pointer; flex-shrink:0; background:#fff; transition: width .15s, height .15s, filter .15s; }\n  .circle:hover { filter:brightness(0.96); }\n  .stage-label { margin-top:10px; font-size:13px; text-align:center; line-height:1.35; width:100%; max-width:110px; word-wrap:break-word; overflow-wrap:break-word; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"toolbar\">\n  <div id=\"hint\">Click a stage number to set the current stage, then download.<\u002Fdiv>\n  <div>\n    <button id=\"downloadBtn\">Download PNG<\u002Fbutton>\n    <button id=\"downloadSvgBtn\">Download SVG<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"capture\">\n  <div id=\"legend\">\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#35b637;\"><\u002Fdiv>Completed<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#e35c2e;\"><\u002Fdiv>Current stage<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#dcdfe4;\"><\u002Fdiv>Upcoming<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"phaseBar\"><\u002Fdiv>\n  <div id=\"stages\"><\u002Fdiv>\n<\u002Fdiv>\n<script>\nconst completedColor = '#35b637';\nconst currentColor = '#e35c2e';\nconst upcomingBorder = '#dcdfe4';\nlet currentStage = 6;\n\nconst phases = [\n  { label: 'REQUIREMENTS VALIDATION & DESIGN APPROVAL', count: 5, color: '#5b86c2' },\n  { label: 'DEVELOPMENT & QA TESTING', count: 4, color: '#3f6aa8' },\n  { label: 'ACCEPTANCE, CHANGE & RELEASE', count: 6, color: '#2c4d80' },\n];\nconst labels = [\n  'Requirement Validation & Refinement', 'Upfront Design & Estimation', 'Design Review & DA Approval',\n  'Development Readiness', 'Feature Branch Creation', 'Development & Dev Testing',\n  'Pull Request / Peer Review', 'Create Deployment Artifacts', 'Quality Assurance',\n  'UAT Acceptance', 'CAB Readiness', 'CAB', 'Deploy', 'Pilot', 'Launch'\n];\n\nconst phaseBarEl = document.getElementById('phaseBar');\nconst stagesEl = document.getElementById('stages');\n\nfunction render() {\n  phaseBarEl.innerHTML = '';\n  phases.forEach(p => {\n    const div = document.createElement('div');\n    div.className = 'phase';\n    div.style.flexGrow = p.count;\n    div.style.background = p.color;\n    div.textContent = p.label;\n    phaseBarEl.appendChild(div);\n  });\n\n  stagesEl.innerHTML = '';\n  labels.forEach((label, i) => {\n    const n = i + 1;\n    const isCompleted = n < currentStage;\n    const isCurrent = n === currentStage;\n    const circleSize = isCurrent ? 68 : 46;\n    let border = upcomingBorder, textColor = '#8a8f99', labelColor = '#737a86', labelWeight = 500, sw = 2, fontSize = 17;\n    if (isCompleted) { border = completedColor; textColor = completedColor; labelColor = '#4d5561'; labelWeight = 600; }\n    if (isCurrent) { border = currentColor; textColor = currentColor; labelColor = currentColor; labelWeight = 700; sw = 3; fontSize = 20; }\n\n    const col = document.createElement('div');\n    col.className = 'stage-col';\n\n    const wrap = document.createElement('div');\n    wrap.className = 'circle-wrap';\n\n    if (i > 0) {\n      const conn = document.createElement('div');\n      conn.className = 'connector';\n      conn.style.background = n <= currentStage ? completedColor : upcomingBorder;\n      wrap.appendChild(conn);\n    }\n\n    const circle = document.createElement('div');\n    circle.className = 'circle';\n    circle.style.width = circleSize + 'px';\n    circle.style.height = circleSize + 'px';\n    circle.style.color = textColor;\n    circle.style.border = sw + 'px solid ' + border;\n    circle.style.fontSize = fontSize + 'px';\n    circle.textContent = n;\n    circle.addEventListener('click', () => { currentStage = n; render(); });\n    wrap.appendChild(circle);\n    col.appendChild(wrap);\n\n    const lbl = document.createElement('div');\n    lbl.className = 'stage-label';\n    lbl.style.color = labelColor;\n    lbl.style.fontWeight = labelWeight;\n    lbl.textContent = label;\n    col.appendChild(lbl);\n\n    stagesEl.appendChild(col);\n  });\n}\nrender();\n\ndocument.getElementById('downloadBtn').addEventListener('click', () => {\n  html2canvas(document.getElementById('capture'), { backgroundColor: '#ffffff', scale: 3 }).then(canvas => {\n    const link = document.createElement('a');\n    link.download = 'project-lifecycle-stage-' + currentStage + '.png';\n    link.href = canvas.toDataURL('image/png');\n    link.click();\n  });\n});\n\nfunction escXml(s) {\n  return s.replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n}\nfunction buildSvg() {\n  const width = 1900, marginX = 40;\n  const contentW = width - marginX * 2;\n  const legendY = 24, barY = 60, barH = 34, circlesY = barY + barH + 54;\n  const parts = [];\n  function legendItem(x, color, text) {\n    parts.push('<circle cx=\"' + x + '\" cy=\"' + legendY + '\" r=\"6\" fill=\"' + color + '\"/><text x=\"' + (x + 16) + '\" y=\"' + (legendY + 5) + '\" font-family=\"Helvetica, Arial, sans-serif\" font-size=\"14\" fill=\"#737a86\">' + text + '<\u002Ftext>');\n  }\n  legendItem(marginX, completedColor, 'Completed');\n  legendItem(marginX + 140, currentColor, 'Current stage');\n  legendItem(marginX + 300, upcomingBorder, 'Upcoming');\n\n  let px = marginX;\n  const totalCount = phases.reduce((a, p) => a + p.count, 0);\n  phases.forEach(p => {\n    const w = contentW * (p.count / totalCount);\n    parts.push('<rect x=\"' + px + '\" y=\"' + barY + '\" width=\"' + w + '\" height=\"' + barH + '\" fill=\"' + p.color + '\"/>');\n    parts.push('<text x=\"' + (px + w / 2) + '\" y=\"' + (barY + barH / 2 + 5) + '\" font-family=\"Helvetica, Arial, sans-serif\" font-size=\"13\" font-weight=\"700\" letter-spacing=\"0.4\" fill=\"#ffffff\" text-anchor=\"middle\">' + escXml(p.label) + '<\u002Ftext>');\n    px += w;\n  });\n\n  const n = labels.length;\n  const colW = contentW / n;\n  const centers = [];\n  for (let i = 0; i < n; i++) centers.push(marginX + colW * i + colW / 2);\n\n  for (let i = 1; i < n; i++) {\n    const color = (i + 1) <= currentStage ? completedColor : upcomingBorder;\n    parts.push('<line x1=\"' + centers[i - 1] + '\" y1=\"' + circlesY + '\" x2=\"' + centers[i] + '\" y2=\"' + circlesY + '\" stroke=\"' + color + '\" stroke-width=\"2\"/>');\n  }\n\n  labels.forEach((label, i) => {\n    const num = i + 1;\n    const isCompleted = num < currentStage;\n    const isCurrent = num === currentStage;\n    const r = isCurrent ? 34 : 23;\n    let border = upcomingBorder, textColor = '#8a8f99', labelColor = '#737a86', labelWeight = 500, sw = 2;\n    if (isCompleted) { border = completedColor; textColor = completedColor; labelColor = '#4d5561'; labelWeight = 600; }\n    if (isCurrent) { border = currentColor; textColor = currentColor; labelColor = currentColor; labelWeight = 700; sw = 3; }\n    const cx = centers[i], cy = circlesY;\n    parts.push('<circle cx=\"' + cx + '\" cy=\"' + cy + '\" r=\"' + r + '\" fill=\"#ffffff\" stroke=\"' + border + '\" stroke-width=\"' + sw + '\"/>');\n    parts.push('<text x=\"' + cx + '\" y=\"' + (cy + 6) + '\" font-family=\"Helvetica, Arial, sans-serif\" font-size=\"' + (isCurrent ? 20 : 17) + '\" font-weight=\"700\" fill=\"' + textColor + '\" text-anchor=\"middle\">' + num + '<\u002Ftext>');\n    const words = label.split(' ');\n    let lines = [], cur = '';\n    words.forEach(w => {\n      const test = cur ? cur + ' ' + w : w;\n      if (test.length > 14) { lines.push(cur); cur = w; } else cur = test;\n    });\n    if (cur) lines.push(cur);\n    lines.forEach((ln, li) => {\n      parts.push('<text x=\"' + cx + '\" y=\"' + (cy + r + 22 + li * 16) + '\" font-family=\"Helvetica, Arial, sans-serif\" font-size=\"13\" font-weight=\"' + labelWeight + '\" fill=\"' + labelColor + '\" text-anchor=\"middle\">' + escXml(ln) + '<\u002Ftext>');\n    });\n  });\n\n  const height = circlesY + 28 + 22 + 3 * 16 + 20;\n  return '<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"' + width + '\" height=\"' + height + '\" viewBox=\"0 0 ' + width + ' ' + height + '\"><rect x=\"0\" y=\"0\" width=\"' + width + '\" height=\"' + height + '\" fill=\"#ffffff\"/>' + parts.join('') + '<\u002Fsvg>';\n}\n\ndocument.getElementById('downloadSvgBtn').addEventListener('click', () => {\n  const svg = buildSvg();\n  const blob = new Blob([svg], { type: 'image/svg+xml' });\n  const url = URL.createObjectURL(blob);\n  const link = document.createElement('a');\n  link.download = 'project-lifecycle-stage-' + currentStage + '.svg';\n  link.href = url;\n  link.click();\n  URL.revokeObjectURL(url);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
